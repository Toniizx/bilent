<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DELCW2E21R"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-DELCW2E21R');

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Bilent - Premium Story (V2)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #7c3aed;
            --primary-glow: rgba(124, 58, 237, 0.5);
            --bg: #030305;
            --text-silver: linear-gradient(180deg, #FFFFFF 0%, #A3A3A3 100%);
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--bg);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .post-container {
            width: 1080px;
            height: 1920px;
            background: radial-gradient(circle at top, #1a1a2e 0%, #030305 70%);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 100px 40px;
            overflow: hidden;
            border: 1px solid #1a1a1a;
        }

        /* Glow Effects */
        .glow {
            position: absolute;
            width: 700px;
            height: 700px;
            background: var(--primary-glow);
            filter: blur(180px);
            border-radius: 50%;
            z-index: 1;
            opacity: 0.8;
            pointer-events: none;
        }

        .glow-top { top: -150px; left: -150px; }
        .glow-center { top: 40%; left: 50%; transform: translate(-50%, -50%); opacity: 0.4; }

        /* Header & Titles */
        .header {
            z-index: 10;
            margin-bottom: 50px;
            text-align: center;
        }

        .logo {
            height: 70px;
            filter: drop-shadow(0 0 20px rgba(124, 58, 237, 0.6));
            margin-bottom: 20px;
        }

        .headline-wrapper {
            text-align: center;
            z-index: 10;
            margin-bottom: 20px;
            width: 100%;
        }

        .headline {
            font-size: 110px;
            font-weight: 800;
            text-transform: uppercase;
            background: var(--text-silver);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -3px;
            line-height: 0.95;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .headline-accent {
            font-size: 90px;
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: -2px;
            display: block;
            margin-top: -5px;
            text-shadow: 0 0 40px var(--primary-glow);
        }

        .sub-tagline {
            font-size: 34px;
            color: #d1d5db;
            margin-top: 25px;
            font-weight: 400;
            letter-spacing: 0.5px;
            padding: 0 20px;
            line-height: 1.3;
        }

        /* Mockup Area */
        .mockup-container {
            position: relative;
            z-index: 15;
            margin-top: 30px;
            width: 1300px; /* Make it pop out of the frame horizontally */
            display: flex;
            justify-content: center;
            filter: drop-shadow(0 40px 100px rgba(0,0,0,0.9));
        }

        .laptop-base {
            width: 100%;
            object-fit: contain;
            /* Remove green screen if possible using filter or just cover it */
        }

        /* Assuming the green screen covers the upper middle of the image, we absolutely position the dashboard over it */
        .screen-content {
            position: absolute;
            background: #111;
            /* Further tweaked to fit the laptop screen exactly avoiding the keyboard */
            top: 21%;
            left: 21%;
            width: 58%;
            height: 38%;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
            transform: perspective(800px) rotateX(2deg); /* slight tilt if needed */
        }

        .screen-content img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Ensures we see the whole dashboard */
            object-position: top center;
            background-color: #f7f9fc; /* Dashboard bg color to fill gaps */
        }

        /* Floating 3D Icons (Business Types) */
        /* Floating 3D Icons (Business Types) */
        .asset-3d {
            position: absolute;
            width: 300px; /* Explicit width to match 1/3 of the image */
            height: 350px;
            background-image: url('./business_icons.png');
            background-size: 300% 100%; /* Stretch background wide */
            background-repeat: no-repeat;
            z-index: 20;
            pointer-events: none;
            animation: float 5s ease-in-out infinite alternate;
            /* Increase contrast and use screen to knock out the black background */
            filter: contrast(1.8) brightness(1.2);
            mix-blend-mode: screen; 
        }

        /* Icon 1: Left (Burger/Food) */
        .icon-left {
            top: 35%;
            left: -2%;
            background-position: left center;
            animation-delay: 0s;
        }
        
        /* Icon 2: Center-Right (Barber/Scissors) */
        .icon-right {
            top: 25%;
            right: -2%;
            background-position: center center;
            animation-delay: 1s;
            animation-duration: 6s;
        }

        /* Icon 3: Bottom Left (Shopping Bag) */
        .icon-bottom {
            bottom: 30%;
            left: 5%;
            background-position: right center;
            transform: rotate(5deg);
            animation-delay: 2s;
            animation-duration: 4.5s;
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(auto); }
            100% { transform: translateY(-30px) rotate(auto); }
        }

        /* Benefits & CTA */
        .cta-section {
            position: absolute;
            bottom: 80px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 30;
        }

        .checklist-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            font-size: 28px;
            color: #fff;
            margin-bottom: 35px;
            background: rgba(124, 58, 237, 0.15);
            padding: 20px 45px;
            border-radius: 100px;
            border: 1px solid rgba(124, 58, 237, 0.4);
            backdrop-filter: blur(20px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
            width: 85%;
            line-height: 1.3;
        }

        .check-icon {
            color: #10b981;
            font-weight: 900;
            font-size: 32px;
            background: rgba(16, 185, 129, 0.2);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .btn-main {
            width: 85%;
            background: linear-gradient(135deg, var(--primary) 0%, #5b21b6 100%);
            color: white;
            padding: 35px;
            border-radius: 25px;
            font-size: 46px;
            font-weight: 800;
            text-transform: uppercase;
            border: 2px solid rgba(255,255,255,0.1);
            cursor: pointer;
            box-shadow: 0 20px 60px rgba(124, 58, 237, 0.5);
            transition: 0.3s;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }

        .btn-secondary {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255,255,255,0.95);
            color: #030305;
            padding: 20px 60px;
            border-radius: 100px;
            font-size: 34px;
            font-weight: 800;
            margin-bottom: 50px;
            box-shadow: 0 10px 40px rgba(255,255,255,0.15);
            letter-spacing: -0.5px;
        }

        .footer-text {
            font-size: 30px;
            color: #888;
            font-weight: 400;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="post-container">
        <!-- Background Glows -->
        <div class="glow glow-top"></div>
        <div class="glow glow-center"></div>

        <!-- Floating 3D Elements (Business Types) -->
        <div class="asset-3d icon-left"></div>
        <div class="asset-3d icon-right"></div>
        <div class="asset-3d icon-bottom"></div>

        <!-- Header -->
        <div class="header">
            <img src="../../logo.png" alt="Bilent" class="logo">
        </div>

        <!-- Headline -->
        <div class="headline-wrapper">
            <h1 class="headline">SISTEMA COMPLETO</h1>
            <h1 class="headline-accent">PARA NEGÓCIOS</h1>
            <p class="sub-tagline">O aliado perfeito para Barbearias, Lojas e Restaurantes.</p>
        </div>

        <!-- App Display (Realistic Mockup) -->
        <div class="mockup-container">
            <img src="./mockup_laptop.png" alt="Laptop" class="laptop-base">
            <div class="screen-content">
                <img src="../../app_dashboard.png" alt="Dashboard Bilent">
            </div>
        </div>

        <!-- CTA Section -->
        <div class="cta-section">
            <div class="checklist-item">
                <span class="check-icon">✓</span>
                <span>Com a IA do <b>Bilent</b>, seu controle é automático e seguro.</span>
            </div>

            <button class="btn-main">TESTE AGORA (GRÁTIS)</button>

            <div class="btn-secondary">
                <span>🔗 Saiba mais no link</span>
                <span>🚀</span>
            </div>

            <p class="footer-text">Arraste para cima para começar</p>
        </div>
    </div>
</body>
</html>
